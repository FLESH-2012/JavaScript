<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
           body {
            background-color: rgb(47, 222, 225); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        
        .navbar {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            gap: 20px;
            box-sizing: border-box;
        }

        .navbar a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
            padding: 8px 20px;
            font-size: 18px;
        }

        .navbar a.active {
            background-color: rgb(45, 155, 195);
            color: white;
            border-radius: 20px;
        }

        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        
        .card {
            width: 400px;
            padding: 40px;
            background-color: rgb(151, 255, 210); 
            text-align: center;
            border-radius: 40px;
            transition: 0.5s ease;
        }

        
        .card img {
            width: 180px; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 20px;
            display: block;
            margin: 0 auto 15px auto;
        }

        .card h1 {
            margin: 10px 0;
            font-size: 28px;
        }

        .card p {
            color: #333;
            line-height: 1.5;
        }

        .card button {
            background-color: rgb(45, 155, 195);
            color: blue;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .card:hover {
            background-color: rgb(84, 221, 82);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="active">Card 1</a>
        <a href="about.html" class="active">Card 2</a>
    </nav>

    <div class="container">
        <div class="card">
            <img src="https://png.pngitem.com/pimgs/s/50-503557_young-man-png-image-background-nitro-canada-hair.png " alt="Profile">
            <h1>Salom👋</h1>
            <p>Men 26-maktabda o'qiyapman.</p>
            <button>CARD 2</button>
        </div>
    </div>
</body>
</html>
</body>
</html>
